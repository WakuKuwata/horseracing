# Single-origin routing (Feature 018, FR-003). Static SPA + reverse-proxy /api/v1/* to the API on
# the SAME origin → no CORS (resolves 015's deferred). Routing boundary (codex B):
#   - `^~ /api/v1/` matches BEFORE the SPA fallback and PRESERVES the path (no trailing slash on
#     proxy_pass) → /api/v1/health reaches the API unchanged; unknown /api/v1/* returns the API 404
#     (never the SPA index.html).
#   - history fallback applies only under `/`.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # nginx liveness (compose healthcheck)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # API: single-origin reverse-proxy, path preserved, forwarded headers for the upstream.
    location ^~ /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI/docs live on the API too (kept single-origin).
    location = /openapi.json { proxy_pass http://api:8000; }
    location ^~ /docs { proxy_pass http://api:8000; }

    # Feature 024: ops WRITE service (separate upstream). Matches BEFORE the SPA fallback and
    # PRESERVES the path (no trailing slash) → unknown /ops/* returns the ops 404, not index.html.
    location ^~ /ops/ {
        proxy_pass http://ops:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # hashed static assets: long cache.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history fallback — ONLY under / (never swallows /api/*).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
